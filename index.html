<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OncOS — Systemic Therapy</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1f6f8b">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Systemic Therapy">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg:#f7f8fa; --panel:#ffffff; --ink:#1a2230; --muted:#5c6878; --line:#e4e8ee;
    --accent:#1f6f8b; --accent-soft:#e8f1f4; --chip:#eef1f5;
    --ok:#1d9e75; --na:#9aa6b4; --danger:#a3322b; --danger-bg:#fdecea; --danger-line:#d98b86;
    --shadow:0 1px 3px rgba(20,30,50,.06),0 1px 2px rgba(20,30,50,.04);
    --mono:"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sidebar-w:248px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg); color:var(--ink); font:14px/1.5 var(--sans); -webkit-text-size-adjust:100%;}

  .wm{margin:0; font-family:var(--mono); font-weight:700; letter-spacing:1px; color:var(--ink);
    display:inline-block; border-left:3px solid var(--accent); padding-left:11px; line-height:1; text-decoration:none;}
  .wm .os{color:var(--accent);}
  .tag{margin:9px 0 0; color:var(--muted); font-size:10px; font-weight:600;
    font-family:var(--mono); letter-spacing:.18em; text-transform:uppercase;}

  .mhead{display:none; position:sticky; top:0; z-index:40; background:var(--panel);
    border-bottom:1px solid var(--line); box-shadow:var(--shadow); align-items:center; gap:12px;
    padding:calc(10px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 10px calc(14px + env(safe-area-inset-left));}
  .burger{flex:0 0 auto; width:38px; height:38px; border:1px solid var(--line); border-radius:9px;
    background:var(--bg); color:var(--ink); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;}
  .burger svg{width:20px;height:20px;}
  .mhead .wm{font-size:20px;}
  .mhead .tag{margin-top:5px;}

  .layout{display:flex; min-height:100vh; min-height:100dvh;}
  .sidebar{flex:0 0 var(--sidebar-w); width:var(--sidebar-w); background:var(--panel);
    border-right:1px solid var(--line); position:sticky; top:0; align-self:flex-start;
    height:100vh; height:100dvh; overflow-y:auto;
    padding:22px 16px calc(22px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:18px;}
  .sidebar .wm{font-size:26px;}
  .sidebar .tag{margin-bottom:2px;}
  .facet .flabel{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:600; margin:0 0 8px 2px;}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{font-size:12px; padding:5px 11px; border-radius:999px; cursor:pointer; background:var(--chip);
    color:var(--muted); border:1px solid transparent; user-select:none; white-space:nowrap;}
  .chip.active{background:var(--accent-soft); color:var(--accent); border-color:var(--accent); font-weight:600;}
  .az{display:flex; flex-wrap:wrap; gap:3px;}
  .az a{font-family:var(--mono); font-size:11px; width:21px; height:21px; display:flex; align-items:center;
    justify-content:center; border-radius:5px; color:var(--muted); text-decoration:none; cursor:pointer;}
  .az a.has{color:var(--accent); font-weight:600;}
  .az a.off{color:var(--line); pointer-events:none;}
  .az a.active{background:var(--accent); color:#fff;}

  .backdrop{display:none;}

  main{flex:1 1 auto; min-width:0; padding:22px clamp(16px,3vw,30px) 40px;}
  .topbar{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
  .h-title{font-size:17px; font-weight:650; margin:0; letter-spacing:-.01em;}
  .count{color:var(--muted); font-size:12px;}
  .search{width:100%; max-width:540px; margin:0 0 16px; padding:10px 13px; font-size:15px;
    border:1px solid var(--line); border-radius:10px; background:var(--panel); color:var(--ink); font-family:var(--sans);}
  .search:focus{outline:2px solid var(--accent); outline-offset:-1px; border-color:var(--accent);}

  .azdiv{font-family:var(--mono); font-weight:700; font-size:13px; color:var(--accent);
    letter-spacing:.05em; margin:18px 0 8px 2px;}
  .azdiv:first-of-type{margin-top:0;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:13px; box-shadow:var(--shadow);
    overflow:hidden; transition:border-color .14s, box-shadow .14s; margin-bottom:12px;}
  .card:hover{border-color:var(--accent);}
  .card.open{border-color:var(--accent); box-shadow:0 6px 20px rgba(20,30,50,.09);}
  .card-head{padding:14px 16px; cursor:pointer; display:flex; justify-content:space-between; gap:12px; align-items:flex-start;}
  .dname{font-weight:650; font-size:16px; line-height:1.3;}
  .dmeta{margin-top:7px; display:flex; flex-wrap:wrap; gap:5px;}
  .tagpill{font-size:10.5px; padding:2px 8px; border-radius:6px; background:var(--chip); color:var(--muted);}
  .tagpill.cls{background:var(--accent-soft); color:var(--accent);}
  .dmech{margin-top:8px; font-size:12px; color:var(--muted);}
  .dbrands{margin-top:3px; font-size:11px; color:var(--muted);}
  .caret{color:var(--accent); font-size:13px; transition:transform .15s; flex-shrink:0; margin-top:3px;}
  .card.open .caret{transform:rotate(90deg);}

  .body{display:none; padding:2px 16px 16px; border-top:1px solid var(--line);}
  .card.open .body{display:block;}
  .sec{margin-top:16px;}
  .sec h3{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); font-weight:600; margin:0 0 7px;}

  .boxwarn{margin-top:14px; border:1px solid var(--danger-line); background:var(--danger-bg); border-radius:9px; padding:10px 12px;}
  .boxwarn .bwl{font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--danger); font-weight:600; margin-bottom:5px;}
  .boxwarn .bwt{font-size:12px; color:#7a241e;}

  table.ind{width:100%; border-collapse:collapse; font-size:11px; table-layout:fixed;}
  table.ind th{font-family:var(--mono); font-size:9px; text-transform:uppercase; letter-spacing:.03em;
    color:var(--muted); font-weight:600; text-align:left; padding:4px 5px; border-bottom:1px solid var(--line);}
  table.ind th.c{text-align:center;}
  table.ind th.hsa{color:var(--accent);}
  table.ind td{padding:6px 5px; border-bottom:1px solid #eef1f5; vertical-align:top;}
  table.ind tr:last-child td{border-bottom:none;}
  table.ind td.c{text-align:center; font-weight:600;}
  .yes{color:var(--ok);} .no{color:var(--na);}
  .indleg{font-size:10px; color:var(--na); margin-top:6px;}

  .cdl{display:flex; align-items:baseline; gap:9px;}
  .cdl .cls{font-size:11px; padding:3px 10px; border-radius:6px; background:var(--accent-soft);
    color:var(--accent); font-weight:600; flex:0 0 auto;}
  .cdl .word{font-size:12.5px;}
  .cdl .br{color:var(--na);}
  ul.cdl-items{margin:8px 0 0; padding-left:16px; font-size:11.5px; line-height:1.5;}
  ul.cdl-items li{margin:2px 0;}
  ul.cdl-items b{color:var(--accent); font-weight:600;}

  .twocol{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px;}
  ul.tox{margin:0; padding-left:16px; font-size:12px; line-height:1.55;}
  ul.tox li.ser{color:var(--danger);}
  table.dr{width:100%; border-collapse:collapse; font-size:10.5px;}
  table.dr th{font-family:var(--mono); font-size:9px; text-transform:uppercase; color:var(--muted);
    text-align:left; font-weight:600; padding:2px 4px; border-bottom:1px solid var(--line);}
  table.dr td{padding:3px 4px; border-bottom:1px solid #eef1f5;}
  table.dr tr:last-child td{border-bottom:none;}
  .drnote{font-size:11px; margin-top:6px; line-height:1.5;}
  .drnote b{color:var(--accent);}

  .foot-src{font-size:10px; color:var(--muted); margin-top:16px; padding-top:9px; border-top:1px dashed var(--line); line-height:1.6;}
  .foot-src b{color:var(--accent);}
  .empty{text-align:center; color:var(--muted); padding:60px 0;}
  .foot{margin-top:26px; padding-top:14px; border-top:1px solid var(--line); color:var(--muted); font-size:11.5px;}

  @media (max-width:880px){
    .mhead{display:flex;}
    .layout{display:block;}
    .sidebar{position:fixed; top:0; left:0; z-index:50; height:100vh; height:100dvh;
      width:min(82vw,300px); flex-basis:auto; transform:translateX(-100%); transition:transform .22s ease;
      box-shadow:0 0 28px rgba(20,30,50,.16); padding-top:calc(22px + env(safe-area-inset-top));}
    body.nav-open .sidebar{transform:translateX(0);}
    .sidebar .wm-wrap{display:none;}
    body.nav-open .backdrop{display:block; position:fixed; inset:0; z-index:45; background:transparent;}
    main{padding:16px;}
    .twocol{grid-template-columns:1fr;}
  }
  @media (min-width:881px){ .mhead{display:none;} }

  @media print{
    .mhead,.sidebar,.search,.backdrop{display:none !important;}
    .layout{display:block;} main{padding:0;}
    .body{display:block !important;}
    .card{break-inside:avoid; box-shadow:none; border-color:var(--line);}
  }
</style>
</head>
<body>

<header class="mhead">
  <button class="burger" id="burger" aria-label="Open navigation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
  </button>
  <div>
    <a class="wm homelink" href="https://jonanze.github.io/oncos/" aria-label="OncOS home">Onc<span class="os">OS</span></a>
    <p class="tag">Systemic Therapy</p>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="wm-wrap">
      <a class="wm homelink" href="https://jonanze.github.io/oncos/" aria-label="OncOS home">Onc<span class="os">OS</span></a>
      <p class="tag">Systemic Therapy</p>
    </div>
    <div class="facet"><div class="flabel">Class</div><div class="chips" id="f-class"></div></div>
    <div class="facet"><div class="flabel">Route</div><div class="chips" id="f-route"></div></div>
    <div class="facet"><div class="flabel">Tumour</div><div class="chips" id="f-tumour"></div></div>
    <div class="facet"><div class="flabel">A–Z</div><div class="az" id="az"></div></div>
  </aside>
  <div class="backdrop" id="backdrop"></div>

  <main>
    <div class="topbar">
      <h1 class="h-title">Drugs</h1>
      <span class="count" id="count"></span>
    </div>
    <input id="search" class="search" type="search" placeholder="Search drug, brand, class, or tumour…" autocomplete="off">
    <div id="list"></div>
    <div class="empty" id="empty" style="display:none">No drugs match.</div>
    <div class="foot" id="foot"></div>
  </main>
</div>

<script src="drugs.js"></script>
<script>
  const data = (window.DRUGS || []).filter(d => d.id && d.name)
    .slice().sort((a,b) => a.name.localeCompare(b.name));

  const listEl = document.getElementById('list');
  const searchEl = document.getElementById('search');
  const countEl = document.getElementById('count');
  const emptyEl = document.getElementById('empty');
  const footEl = document.getElementById('foot');

  let activeClass = null, activeRoute = null, activeTumour = null, activeLetter = null, query = '';

  function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  const uniq = arr => [...new Set(arr)].sort();
  const classes = uniq(data.map(d => d.class).filter(Boolean));
  const routes  = uniq(data.flatMap(d => d.route || []));
  const tumours = uniq(data.flatMap(d => d.tumours || []));

  function chip(label, active, onClick){
    const el = document.createElement('span');
    el.className = 'chip' + (active ? ' active' : '');
    el.textContent = label; el.onclick = onClick; return el;
  }
  function renderFacet(elId, values, getActive, setActive){
    const box = document.getElementById(elId);
    box.innerHTML = '';
    box.appendChild(chip('All', !getActive(), () => { setActive(null); render(); }));
    values.forEach(v => box.appendChild(chip(v, getActive() === v, () => {
      setActive(getActive() === v ? null : v); render();
    })));
  }

  function renderAZ(present){
    const az = document.getElementById('az'); az.innerHTML = '';
    for (let i = 65; i <= 90; i++){
      const L = String.fromCharCode(i);
      const a = document.createElement('a');
      const has = present.has(L);
      a.textContent = L;
      a.className = 'az-l' + (has ? ' has' : ' off') + (activeLetter === L ? ' active' : '');
      if (has) a.onclick = () => {
        activeLetter = activeLetter === L ? null : L;
        document.body.classList.remove('nav-open'); render();
      };
      az.appendChild(a);
    }
  }

  function matches(d){
    if (activeClass && d.class !== activeClass) return false;
    if (activeRoute && !(d.route || []).includes(activeRoute)) return false;
    if (activeTumour && !(d.tumours || []).includes(activeTumour)) return false;
    if (activeLetter && d.name[0].toUpperCase() !== activeLetter) return false;
    if (query){
      const hay = [d.name, ...(d.aliases||[]), ...(d.brands||[]), d.class, d.subclass,
        ...(d.tumours||[]), ...(d.indications||[]).map(i => i.indication), d.atc].join(' ').toLowerCase();
      if (!query.split(/\s+/).every(t => hay.includes(t))) return false;
    }
    return true;
  }

  const mark = v => v === 'y'
    ? '<span class="yes">✓</span>'
    : '<span class="no">–</span>';

  function indTable(inds){
    const rows = inds.map(i => `<tr>
      <td>${esc(i.indication)}</td>
      <td class="c">${mark(i.hsa)}</td>
      <td class="c">${mark(i.fda)}</td>
      <td>${esc(i.dose)}</td></tr>`).join('');
    return `<table class="ind">
      <colgroup><col style="width:36%"><col style="width:11%"><col style="width:11%"><col style="width:42%"></colgroup>
      <tr><th>Indication</th><th class="c hsa">HSA</th><th class="c">FDA</th><th>Dose</th></tr>
      ${rows}</table>
      <div class="indleg">✓ on label · – not on that regulator's label. Approval status only — not a statement on clinical use.</div>`;
  }

  function drTable(dr){
    if (!dr) return '';
    let html = '';
    if (dr.toxicityTable && dr.toxicityTable.length){
      html += `<table class="dr"><tr><th>Grade</th><th>1st</th><th>2nd</th><th>3rd</th></tr>
        ${dr.toxicityTable.map(r => `<tr><td>${esc(r.grade)}</td>${r.levels.map(l=>`<td>${esc(l)}</td>`).join('')}</tr>`).join('')}</table>`;
    }
    const notes = [];
    if (dr.renal)   notes.push(`<b>Renal:</b> ${esc(dr.renal)}`);
    if (dr.hepatic) notes.push(`<b>Hepatic:</b> ${esc(dr.hepatic)}`);
    (dr.other||[]).forEach(o => notes.push(`<b>${esc(o.label)}:</b> ${esc(o.text)}`));
    if (notes.length) html += `<div class="drnote">${notes.join('<br>')}</div>`;
    return html;
  }

  function cardHTML(d){
    const chips = [
      d.class ? `<span class="tagpill cls">${esc(d.class)}</span>` : '',
      d.subclass ? `<span class="tagpill">${esc(d.subclass)}</span>` : '',
      ...(d.route||[]).map(r => `<span class="tagpill">${esc(r)}</span>`),
      d.atc ? `<span class="tagpill">ATC ${esc(d.atc)}</span>` : ''
    ].join('');

    const boxed = d.boxedWarning ? `<div class="boxwarn">
      <div class="bwl">⚠ FDA boxed warning</div>
      <div class="bwt">${esc(d.boxedWarning)}</div></div>` : '';

    const inds = (d.indications && d.indications.length) ? `<div class="sec">
      <h3>Indications · approval · dose</h3>${indTable(d.indications)}</div>` : '';

    const cdl = d.cdl ? `<div class="sec"><h3>CDL status</h3>
      <div class="cdl"><span class="cls">${esc(d.cdl.class)}</span>${d.cdl.limit ? `<span class="word">${esc(d.cdl.limit)}</span>` : ''}${d.cdl.wording
        ? `<span class="word"><span class="br">[</span> ${esc(d.cdl.wording)} <span class="br">]</span></span>` : ''}</div>
      ${(d.cdl.items && d.cdl.items.length) ? `<ul class="cdl-items">${d.cdl.items.map(i => `<li><b>${esc(i.cancer)}:</b> ${esc(i.text)}</li>`).join('')}</ul>` : ''}</div>` : '';

    const tox = d.toxicities ? `<div>
      <h3 style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin:0 0 7px;">Common toxicities</h3>
      <ul class="tox">${(d.toxicities.common||[]).map(t=>`<li>${esc(t)}</li>`).join('')}
        ${(d.toxicities.serious&&d.toxicities.serious.length)?`<li class="ser">Serious: ${d.toxicities.serious.map(esc).join(', ')}</li>`:''}</ul></div>` : '';

    const dr = d.doseReductions ? `<div>
      <h3 style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin:0 0 7px;">Dose reductions</h3>
      ${drTable(d.doseReductions)}</div>` : '';

    const twocol = (tox || dr) ? `<div class="twocol">${tox}${dr}</div>` : '';

    const foot = (d.sources || d.verified) ? `<div class="foot-src">
      ${d.verified ? `<b>✓ Verified ${esc(d.verified)}</b> — ` : ''}${d.sources ? 'Sources: ' + esc(d.sources) + '. ' : ''}Confirm against current prescribing info, the live CDL, and institutional protocol.</div>` : '';

    return `<div class="card" data-id="${esc(d.id)}">
      <div class="card-head">
        <div>
          <div class="dname">${esc(d.name)}</div>
          <div class="dmeta">${chips}</div>
          ${d.mechanism ? `<div class="dmech">${esc(d.mechanism)}</div>` : ''}
          ${(d.brands&&d.brands.length) ? `<div class="dbrands">Brands: ${d.brands.map(esc).join(' · ')}</div>` : ''}
        </div>
        <span class="caret">▶</span>
      </div>
      <div class="body">${boxed}${inds}${cdl}${twocol}${foot}</div>
    </div>`;
  }

  function render(){
    renderFacet('f-class', classes, () => activeClass, v => activeClass = v);
    renderFacet('f-route', routes, () => activeRoute, v => activeRoute = v);
    renderFacet('f-tumour', tumours, () => activeTumour, v => activeTumour = v);
    renderAZ(new Set(data.map(d => d.name[0].toUpperCase())));

    const list = data.filter(matches);
    let html = '', letter = '';
    list.forEach(d => {
      const L = d.name[0].toUpperCase();
      if (L !== letter){ letter = L; html += `<div class="azdiv">${L}</div>`; }
      html += cardHTML(d);
    });
    listEl.innerHTML = html;

    const filtered = activeClass || activeRoute || activeTumour || activeLetter || query;
    countEl.textContent = filtered ? `${list.length} of ${data.length} drugs` : `${data.length} drug${data.length===1?'':'s'}`;
    emptyEl.style.display = list.length ? 'none' : 'block';
    listEl.querySelectorAll('.card-head').forEach(h => h.onclick = () => h.parentElement.classList.toggle('open'));
  }

  searchEl.addEventListener('input', e => { query = e.target.value.trim().toLowerCase(); render(); });
  document.getElementById('burger').onclick = () => document.body.classList.toggle('nav-open');
  document.getElementById('backdrop').onclick = () => document.body.classList.remove('nav-open');

  footEl.textContent = `${data.length} verified drug${data.length===1?'':'s'} · OncOS — Systemic Therapy`;
  render();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
</html>
